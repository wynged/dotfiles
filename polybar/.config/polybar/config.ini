;==============================================================================
; Polybar for Regolith i3 (X11) — full-width bar, centered workspaces.
;
; Lives in dotfiles (stow package "polybar"). Colors are pulled from the same
; Xresources keys Regolith's theme sets, so it tracks the Ayu look. The i3
; module reuses i3's workspace NAMES, which we set to "number + icon" in
; ~/.config/regolith3/Xresources — so the glyphs show here automatically.
;
; Icons use the FontAwesome range of FiraCode Nerd Font (the Material-Design
; range is absent in this build, so stick to F0xx-F2xx codepoints).
;==============================================================================

[colors]
background = ${xrdb:wm.bar.background.color:#1F2430}
foreground = ${xrdb:wm.bar.statusline.color:#E6E1CF}
accent     = ${xrdb:wm.bar.workspace.focused.background.color:#FFA759}
active     = ${xrdb:wm.bar.workspace.active.background.color:#FFE6B3}
muted      = ${xrdb:wm.bar.workspace.inactive.text.color:#BFBAB0}
urgent     = ${xrdb:wm.bar.workspace.urgent.background.color:#FF3333}
dark       = ${xrdb:wm.bar.workspace.focused.text.color:#1F2430}
sep        = ${xrdb:wm.bar.separator.color:#77A8D9}

[bar/main]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 30
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
border-size = 0
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
font-0 = FiraCode Nerd Font:size=11;2
font-1 = FiraCode Nerd Font:size=13;3
; THIS is the centering: workspaces in the middle, status split to the edges.
modules-left = cpu gpu memory filesystem
modules-center = i3
modules-right = pulseaudio eth date tray
cursor-click = pointer
enable-ipc = true

[module/tray]
type = internal/tray
tray-background = ${colors.background}
tray-spacing = 8px

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
; Keep the leading number visible (the icon is part of the i3 workspace name).
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
fuzzy-match = true
format = <label-state>
label-focused = %name%
label-focused-foreground = ${colors.dark}
label-focused-background = ${colors.accent}
label-focused-padding = 2
label-visible = %name%
label-visible-foreground = ${colors.dark}
label-visible-background = ${colors.active}
label-visible-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2
label-urgent = %name%
label-urgent-foreground = #ffffff
label-urgent-background = ${colors.urgent}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.sep}
label = %percentage:2%%

[module/gpu]
; AMD GPU has no built-in polybar module, so read gpu_busy_percent via a script.
type = custom/script
exec = ~/.config/polybar/gpu-usage.sh
interval = 2
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.sep}
label = %output%

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.sep}
label = %percentage_used:2%%

[module/filesystem]
type = internal/fs
interval = 60
mount-0 = /
format-mounted = <label-mounted>
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.sep}
label-mounted = %percentage_used%%
label-unmounted =

[module/eth]
type = internal/network
interface = enp42s0
interface-type = wired
interval = 3
format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.sep}
label-connected = %local_ip%
format-disconnected = <label-disconnected>
label-disconnected = offline
label-disconnected-foreground = ${colors.muted}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = " muted"
label-muted-foreground = ${colors.muted}
ramp-volume-0 = ""
ramp-volume-1 = ""
ramp-volume-2 = ""
ramp-volume-foreground = ${colors.sep}
click-right = pavucontrol

[module/date]
type = internal/date
interval = 5
date = %a %d %b
time = %H:%M
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.sep}
label = %date%  %time%
