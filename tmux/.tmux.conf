set -g mouse on
set-option -g status-position top

# Disable right-click context menu (keeps mouse scroll + selection)
unbind -n MouseDown3Pane
unbind -n M-MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight

# Vi mode for copy
set-window-option -g mode-keys vi

# Mouse drag auto-copies to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Vi-style: v to select, y to yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Dim inactive panes to make the active pane obvious
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# Memorable split bindings: | for vertical, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane switching (prefix + j/k — h remapped to town-hall, l to lookout)
bind j select-pane -D
bind k select-pane -U

# Quick navigation
bind m switch-client -t mayor
bind l switch-client -t lookout

# Lookout: dispatch office popup (inbox for human + compose-to-mayor)
bind L display-popup -E -w 90% -h 85% -T " 🔭 lookout " "/home/sirwassail/source/city_hy/lookout/scripts/lookout-popup.sh"

# No-prefix smart navigation (Alt + h/j/k/l)
# Multi-pane: switch panes. Single-pane: cycle windows.
bind -n M-h if-shell '[ #{window_panes} -gt 1 ]' 'select-pane -L' 'previous-window'
bind -n M-j if-shell '[ #{window_panes} -gt 1 ]' 'select-pane -D' 'previous-window'
bind -n M-k if-shell '[ #{window_panes} -gt 1 ]' 'select-pane -U' 'next-window'
bind -n M-l if-shell '[ #{window_panes} -gt 1 ]' 'select-pane -R' 'next-window'

# Alt-n: cycle through ALL sessions, ignoring group/hall filtering
bind -n M-n switch-client -n

# Set Windows Terminal tab title from tmux session:window
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Status bar configuration
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colors
set -g status-style 'bg=colour235,fg=colour250'
set -g status-left-style 'bg=colour235,fg=colour250'
set -g status-right-style 'bg=colour235,fg=colour250'

# Left: session name
set -g status-left-length 30
set -g status-left '#[fg=colour117,bold]#{?#{==:#S,town-hall},🏫 TownHall,[#S]}#[default] '

# Right: git branch + dev servers (updates every 5s)
set -g status-right-length 80
set -g status-right '#[fg=colour114]#(~/.tmux/scripts/statusline.sh "#{pane_current_path}")#[default] │ #[fg=colour248]%H:%M#[default]'

# Window status
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[fg=colour117,bold] #I:#W #[default]'


