# Collapse GNOME's redundant "us,us" dual keyboard layout to a single group.
# The second identical group makes i3 emit harmless "Duplicate keybinding"
# warnings (nagbar) for every letter binding. GNOME re-adds it on each login, so
# we fix it after startup and reload once to dismiss the parse-time nagbar.
exec --no-startup-id sh -c 'sleep 2 && setxkbmap us && i3-msg reload'

# Polybar replaces Regolith's i3bar (centered workspaces — see Xresources).
# exec_always so it relaunches on every reload; the script kills the old one.
exec_always --no-startup-id ~/.config/polybar/launch.sh

# Browse workspace 10 — Claude Desktop + Obsidian (tabbed, left 1/3) + general
# Chrome (right 2/3). browse-layout.sh launches all three and append_layout pins
# each to its sized slot, so Obsidian is pre-launched here at login too. sleep 2
# lets i3 finish init; it runs before dev-layout (sleep 3) so final login focus
# still lands on ws8.
exec --no-startup-id bash -c "sleep 2 && $HOME/.config/regolith3/scripts/browse-layout.sh"

# PWA app windows — Slack/Gather/YouTube Music. Each self-routes to its home
# workspace (ws7/ws9) via 50-assignments.conf.
exec --no-startup-id ~/.config/regolith3/scripts/startup-apps.sh

# Dev workspace 8 — debug browser (DevTools port 9222) + terminal from first login.
# sleep 3 gives i3 time to finish initializing before layout commands run.
exec --no-startup-id bash -c "sleep 3 && $HOME/.config/regolith3/scripts/dev-layout.sh"
