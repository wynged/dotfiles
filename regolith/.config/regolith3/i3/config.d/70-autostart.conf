# Polybar replaces Regolith's i3bar (centered workspaces — see Xresources).
# exec_always so it relaunches on every reload; the script kills the old one.
exec_always --no-startup-id ~/.config/polybar/launch.sh

# Obsidian on workspace 1 — pre-launched so Super+1 is always instant
exec --no-startup-id obsidian

# Dev workspace 8 — browser + terminal ready from first login.
# sleep 3 gives i3 time to finish initializing before layout commands run.
exec --no-startup-id bash -c "sleep 3 && $HOME/.config/regolith3/scripts/dev-layout.sh"
