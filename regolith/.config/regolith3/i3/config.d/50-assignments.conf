# Route windows to their home workspaces.
#
# After a fresh install, fill in the three TODO stubs:
#   xprop | grep WM_CLASS   →   click the running app window
# The second quoted value is the class to use here.

# Workspace 1: Obsidian
assign [class="obsidian"] 1

# Workspace 4: Files — Nautilus goes here; Yazi WezTerm is placed by files-layout.sh
assign [class="org.gnome.Nautilus"] 4

# Workspace 5: Claude Desktop
# TODO: xprop | grep WM_CLASS → click Claude Desktop
# assign [class="TODO"] 5

# Workspace 6: free (Gather now shares Workspace 9 with Slack — see below)

# Chrome PWAs share class="chrome-dev" with the dev browser, so they can't be
# matched on class — they're matched on their stable per-app instance
# (crx_<app id>, from `xprop WM_CLASS` → first value). i3 uses the FIRST matching
# assign, so these must come BEFORE the broad chrome-dev / Google-chrome rules.
# Workspace 7: YouTube Music
assign [instance="crx_cinhimbnkkaeohfgghhklpknlkffjgod"] 7
# Workspace 9: Slack + Gather, side by side (both land here and tile)
assign [instance="crx_cjegmahegccmkkneaindnbeppnipnadp"] 9
assign [instance="crx_lbopdchpdedgklbinbhhgnglcghfdjid"] 9

# Workspace 8: Dev — chrome-dev is routed by its --class= launch flag
assign [class="chrome-dev"] 8

# Workspace 10: Chrome browsing — catches any Chrome window not claimed above
assign [class="Google-chrome"] 10

# ScratchPad notes popup (WezTerm launched with --class=scratchnotes). Float it,
# size + center it, mark it, then stash it in the i3 scratchpad and reveal it.
# $mod+n (see 60-keybindings.conf) toggles it from any workspace.
for_window [class="scratchnotes"] floating enable, resize set 1100 720, move position center, mark scratchnotes, move scratchpad, scratchpad show
