# Each `## Category // Action // Keybinding ##` comment registers the binding
# below it with Regolith's keybinding viewer (Super+Shift+? · ilia -p keybindings),
# so these custom shortcuts show up alongside the stock ones. In the keybinding
# column, `<>` is Super and `<Ctrl>`/`<Shift>` are the modifiers.

# Screenshot: drag a region, annotate with pen, copy to clipboard (mirrors Win+Shift+S)
## Custom // Screenshot Region // <><Shift> s ##
bindsym $mod+Shift+s exec --no-startup-id flameshot gui

# Screen recording (gpu-screen-recorder, AMD-hardware-encoded). First press picks
# the target; press again to stop + save to ~/Videos. The ShareX video grab.
# On 'v' (video): the 'r' key is fully taken by Regolith (resize/restart/refresh).
## Custom // Record Window // <><Shift> v ##
bindsym $mod+Shift+v exec --no-startup-id ~/.config/regolith3/scripts/screen-record.sh window
## Custom // Record Screen // <><Ctrl><Shift> v ##
bindsym $mod+ctrl+Shift+v exec --no-startup-id ~/.config/regolith3/scripts/screen-record.sh screen

# Resize focused pane (10 ppt per press — nudge splits toward 1/3 or 2/3)
## Custom // Grow Pane Width // <><Ctrl> l ##
bindsym $mod+ctrl+l resize grow   width  10 px or 10 ppt
## Custom // Shrink Pane Width // <><Ctrl> h ##
bindsym $mod+ctrl+h resize shrink width  10 px or 10 ppt
## Custom // Grow Pane Height // <><Ctrl> k ##
bindsym $mod+ctrl+k resize grow   height 10 px or 10 ppt
## Custom // Shrink Pane Height // <><Ctrl> j ##
bindsym $mod+ctrl+j resize shrink height 10 px or 10 ppt

# Rebuild workspace layouts on demand
## Custom // Dev Workspace Layout // <><Ctrl> d ##
bindsym $mod+ctrl+d exec --no-startup-id ~/.config/regolith3/scripts/dev-layout.sh
# Reopen (or focus) just the ws8 debug Chrome with DevTools port 9222 — for when
# it gets closed without rebuilding the whole dev layout. Idempotent.
## Custom // Reopen Debug Browser // <><Ctrl><Shift> d ##
bindsym $mod+ctrl+Shift+d exec --no-startup-id ~/.config/regolith3/scripts/debug-browser.sh
## Custom // Files Workspace Layout // <><Ctrl> f ##
bindsym $mod+ctrl+f exec --no-startup-id ~/.config/regolith3/scripts/files-layout.sh
## Custom // Browse Workspace Layout // <><Ctrl> b ##
bindsym $mod+ctrl+b exec --no-startup-id ~/.config/regolith3/scripts/browse-layout.sh

# Toggle the floating ScratchPad notes browser on any workspace (i3 scratchpad).
# Uses Super+Ctrl+n: plain Super+n (and Super+Shift+n) are held by a persistent
# external X grab, so i3 never sees them. bindcode 57 == the "n" key; bindcode
# avoids i3's keysym-expansion "Duplicate keybinding" warnings.
## Custom // Scratch Notes // <><Ctrl> n ##
bindcode $mod+Control+57 exec --no-startup-id ~/.config/regolith3/scripts/scratch-notes.sh
