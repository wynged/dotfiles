# Screenshot: drag a region, annotate with pen, copy to clipboard (mirrors Win+Shift+S)
bindsym $mod+Shift+s exec --no-startup-id flameshot gui

# Resize focused pane (10 ppt per press — nudge splits toward 1/3 or 2/3)
bindsym $mod+ctrl+l resize grow   width  10 px or 10 ppt
bindsym $mod+ctrl+h resize shrink width  10 px or 10 ppt
bindsym $mod+ctrl+k resize grow   height 10 px or 10 ppt
bindsym $mod+ctrl+j resize shrink height 10 px or 10 ppt

# Rebuild workspace layouts on demand
bindsym $mod+ctrl+d exec --no-startup-id ~/.config/regolith3/scripts/dev-layout.sh
bindsym $mod+ctrl+f exec --no-startup-id ~/.config/regolith3/scripts/files-layout.sh

# Toggle the floating ScratchPad notes browser on any workspace (i3 scratchpad)
#ISO bindsym $mod+n exec --no-startup-id ~/.config/regolith3/scripts/scratch-notes.sh
